name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Docker Compose version
        run: docker compose version

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Migrate
        run: make migrate

      - name: Tear down
        if: always()
        run: make down
